services:
  - type: web
    name: zwei-bruder-site
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run db:push && npm run db:seed && npm run start
    envVars:
      - key: NODE_VERSION
        value: 24.16.0
      - key: DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
