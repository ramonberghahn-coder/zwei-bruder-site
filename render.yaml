services:
  - type: web
    name: zwei-bruder-site
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma db push && (node prisma/seed.mjs || true) && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 24.16.0
      - key: DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
